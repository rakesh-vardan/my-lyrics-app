<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#0369a1"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Music note symbol -->
  <g fill="white">
    <!-- Note head 1 -->
    <ellipse cx="196" cy="340" rx="52" ry="38" transform="rotate(-20 196 340)"/>
    <!-- Note head 2 -->
    <ellipse cx="340" cy="310" rx="52" ry="38" transform="rotate(-20 340 310)"/>
    <!-- Stems -->
    <rect x="236" y="120" width="12" height="224" rx="6" transform="rotate(2 242 232)"/>
    <rect x="380" y="90" width="12" height="224" rx="6" transform="rotate(2 386 202)"/>
    <!-- Beam -->
    <rect x="242" y="108" width="150" height="18" rx="4" transform="rotate(-8 317 117)"/>
    <rect x="242" y="140" width="150" height="18" rx="4" transform="rotate(-8 317 149)"/>
  </g>
  <!-- Telugu letter "ల" (La) subtle watermark -->
  <text x="256" y="450" text-anchor="middle" font-family="Noto Sans Telugu, sans-serif" font-size="60" fill="rgba(255,255,255,0.25)" font-weight="bold">లిరిక్స్</text>
</svg>
